name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: studytool
          POSTGRES_PASSWORD: studytool_dev
          POSTGRES_DB: studytool_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongo:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: studytool
          MONGO_INITDB_ROOT_PASSWORD: studytool_dev
        ports:
          - 27017:27017

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://studytool:studytool_dev@localhost:5432/studytool_test
          MONGO_URL: mongodb://studytool:studytool_dev@localhost:27017
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-not-for-production
          ENVIRONMENT: test
        run: |
          pytest tests/ -v --tb=short
